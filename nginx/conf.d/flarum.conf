# ================================================================
#   Nginx Virtual Host — Diễn Đàn Sinh Viên (Flarum)
# ================================================================

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # ─── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Static Assets ────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── PHP-FPM → container flarum ───────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass flarum:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        # SCRIPT_FILENAME phải khớp path bên trong container flarum
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   /var/www/html/public;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ─── Bảo mật: chặn file nhạy cảm ─────────────────────────
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|log|sh|sql|bak)$ {
        deny all;
    }

    location ~* /vendor/.*\.php$ {
        deny all;
        return 403;
    }

    # ─── Flarum storage: chặn public access ───────────────────
    location ~* ^/storage/.*$ {
        return 403;
    }

    # ─── Favicons ─────────────────────────────────────────────
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
}
