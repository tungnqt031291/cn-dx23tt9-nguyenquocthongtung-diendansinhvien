server {
    listen 80;
    server_name _;

    # crazymax/flarum lưu public files tại /data/www/public
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # Flarum front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # PHP-FPM → container flarum (port 9000)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass flarum:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        # Path phải khớp với bên trong container crazymax/flarum
        fastcgi_param SCRIPT_FILENAME /data/www/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   /data/www/public;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTP_PROXY      "";

        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Bảo mật
    location ~ /\. {
        deny all;
    }

    location ~* /vendor/.*\.php$ {
        deny all;
        return 403;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { allow all; log_not_found off; access_log off; }
}
