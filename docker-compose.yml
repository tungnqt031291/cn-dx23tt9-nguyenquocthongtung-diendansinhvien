version: '3.8'

services:
  # Database MySQL / MariaDB
  database:
    image: mariadb:10.11
    container_name: flarum_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: flarum
      MYSQL_USER: flarum_user
      MYSQL_PASSWORD: flarum_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./setup/demo-data:/docker-entrypoint-initdb.d  # tự động import dữ liệu mẫu nếu có
    networks:
      - flarum_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Flarum (PHP-FPM)
  flarum:
    image: crazymax/flarum:latest
    container_name: flarum_app
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      - FLARUM_BASE_URL=http://localhost:8080
      - FLARUM_FORUM_TITLE=Diễn Đàn Sinh Viên
      - DB_HOST=database
      - DB_PORT=3306
      - DB_NAME=flarum
      - DB_USER=flarum_user
      - DB_PASSWORD=flarum_pass
      - FLARUM_ADMIN_USER=admin
      - FLARUM_ADMIN_PASS=admin123
      - FLARUM_ADMIN_MAIL=admin@studentforum.edu
      - FLARUM_ENABLE_HTTPS=false
    volumes:
      - flarum_data:/data
      - ./src/extensions:/data/extensions  # extension tùy chỉnh
      - ./src/assets:/data/assets          # logo, css tùy chỉnh
    networks:
      - flarum_network

  # Web Server Nginx
  nginx:
    image: nginx:alpine
    container_name: flarum_nginx
    restart: unless-stopped
    depends_on:
      - flarum
    ports:
      - "8080:80"
    volumes:
      - flarum_data:/data
      - ./setup/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - flarum_network

  # (Tùy chọn) phpMyAdmin - quản trị database qua web
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: flarum_phpmyadmin
    restart: unless-stopped
    depends_on:
      - database
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    ports:
      - "8081:80"
    networks:
      - flarum_network

volumes:
  db_data:
  flarum_data:

networks:
  flarum_network:
    driver: bridge