services:
  # ─── Database ──────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: ddsv_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (cache / queue) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ddsv_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Flarum ────────────────────────────────────────────────
  flarum:
    image: crazymax/flarum:latest
    container_name: ddsv_flarum
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App
      FLARUM_BASE_URL: ${FLARUM_BASE_URL}
      FLARUM_TITLE: "Diễn Đàn Sinh Viên"
      FLARUM_DESCRIPTION: "Nơi kết nối, chia sẻ và học hỏi của sinh viên Việt Nam"
      FLARUM_DEFAULT_LANGUAGE: vi
      FLARUM_DEFAULT_LOCALE: vi
      FLARUM_DEBUG: ${FLARUM_DEBUG:-false}
      # Database
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PREFIX: flarum_
      # Admin
      FLARUM_ADMIN_USER: ${ADMIN_USER}
      FLARUM_ADMIN_PASS: ${ADMIN_PASS}
      FLARUM_ADMIN_MAIL: ${ADMIN_MAIL}
      # Mail
      MAIL_DRIVER: ${MAIL_DRIVER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SSL: ${MAIL_SSL:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM: ${MAIL_FROM:-noreply@dien-dan-sinh-vien.local}
      MAIL_FROM_NAME: "Diễn Đàn Sinh Viên"
    volumes:
      - flarum_www:/var/www/html          # Toàn bộ source, chia sẻ với Nginx
      - flarum_storage:/var/www/html/storage
      - ./flarum-config/config.php:/var/www/html/config.php:ro
    networks:
      - internal
      - web

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ddsv_nginx
    restart: unless-stopped
    depends_on:
      - flarum
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - flarum_www:/var/www/html:ro
      - ssl_certs:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    networks:
      - web
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  flarum_www:
    driver: local
  flarum_storage:
    driver: local
  ssl_certs:
    driver: local
  nginx_logs:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  web:
    driver: bridge
